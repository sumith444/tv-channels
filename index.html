<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StreamHub Ultra | Complete IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0c10;
            color: #eef2ff;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* MAIN VIDEO AREA */
        .player-section {
            flex: 1;
            background: #000;
            position: relative;
            min-height: 240px;
        }

        #video-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Overlay controls */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            padding: 12px 12px 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 20;
        }

        .controls-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .control-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(20, 25, 35, 0.8);
            border: none;
            color: white;
            font-size: 18px;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.94); background: #0084ff; }

        .progress-container {
            flex: 2;
            min-width: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #progress-bar {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #0084ff;
            cursor: pointer;
        }

        .volume-panel {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 30px;
        }

        #volume-slider {
            width: 70px;
            height: 3px;
        }

        /* SIDEBAR (channel list) */
        .channels-panel {
            background: #111418;
            border-top: 1px solid #2a2f38;
            display: flex;
            flex-direction: column;
            height: 45%;
            max-height: 45%;
        }

        .search-box {
            padding: 10px 15px;
            position: relative;
            border-bottom: 1px solid #2a2f38;
        }

        #search {
            width: 100%;
            padding: 12px 12px 12px 38px;
            background: #1e242c;
            border: 1px solid #2f3540;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #search:focus { border-color: #0084ff; }

        .search-icon {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa4b2;
            font-size: 14px;
        }

        .channel-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .channel-category {
            margin-bottom: 20px;
        }

        .category-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #0084ff;
            margin: 8px 0 6px 6px;
        }

        .channel-item {
            padding: 10px 14px;
            background: #1a1f26;
            margin-bottom: 6px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            border-left: 3px solid transparent;
        }

        .channel-item.active {
            background: #1f2a3a;
            border-left-color: #0084ff;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85%;
        }

        .playing-badge {
            color: #0084ff;
            font-size: 12px;
            display: none;
        }

        .channel-item.active .playing-badge {
            display: inline-block;
        }

        /* floating menus */
        .floating-menu {
            position: absolute;
            bottom: 80px;
            right: 15px;
            background: #1e252fcc;
            backdrop-filter: blur(16px);
            border-radius: 18px;
            padding: 8px 0;
            min-width: 160px;
            display: none;
            flex-direction: column;
            z-index: 30;
            border: 1px solid #3a4455;
        }

        .floating-menu.show {
            display: flex;
        }

        .menu-option {
            padding: 10px 18px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .menu-option.selected { color: #0084ff; font-weight: bold; }

        .loading-indicator, .error-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000cc;
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            display: flex;
            gap: 10px;
            z-index: 25;
            pointer-events: none;
        }

        .error-toast { background: #ff3b30cc; pointer-events: auto; cursor: pointer; display: none; }
        .center-play-big {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            width: 65px;
            height: 65px;
            background: #0084ffdd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 22;
        }

        /* Keyboard hint */
        .keyboard-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 21;
        }

        @media (max-width: 700px) {
            .btn { width: 36px; height: 36px; font-size: 14px; }
            .volume-panel { padding: 2px 8px; }
            #volume-slider { width: 55px; }
            .control-bar { gap: 6px; }
            .keyboard-hint { display: none; }
        }
    </style>
</head>

<div class="player-section">
    <div id="video-container">
        <video id="video" playsinline preload="metadata"></video>

                <div class="volume-panel">

                    <input type="range" id="volumeSlider" min="0" max="1" step="0.02" value="1">
                </div>
                <div class="progress-container">
                    <input type="range" id="progressBar" value="0" step="0.1">
                </div>
                <button class="btn" id="speedBtn"><i class="fas fa-tachometer-alt"></i></button>
                <button class="btn" id="qualityBtn"><i class="fas fa-sliders-h"></i></button>
                <button class="btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
            </div>
        </div>
        <div class="center-play-big" id="centerPlayAnim"><i class="fas fa-play" style="font-size: 28px;"></i></div>
        <div class="loading-indicator" id="loadingSpinner"><i class="fas fa-circle-notch fa-spin"></i> Loading...</div>
        <div class="error-toast" id="errorToast"><i class="fas fa-exclamation-triangle"></i> Error - Tap to retry</div>
        <div class="keyboard-hint"><i class="fas fa-keyboard"></i> Space/K ⏯ | ↑/↓ 🔊 | ←/→ ⏩⏪ | M 🔇 | F 🖥️</div>
    </div>
    <!-- floating menus -->
    <div id="speedMenu" class="floating-menu"></div>
    <div id="qualityMenu" class="floating-menu"></div>
</div>

<div class="channels-panel">

</div>

    // DOM elements and player logic
    const video = document.getElementById('video');
    const overlay = document.getElementById('controlsOverlay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const muteBtn = document.getElementById('muteBtn');
    const muteIcon = document.getElementById('muteIcon');
    const volumeSlider = document.getElementById('volumeSlider');
    const progressBar = document.getElementById('progressBar');
    const speedBtn = document.getElementById('speedBtn');
    const qualityBtn = document.getElementById('qualityBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const errorToast = document.getElementById('errorToast');
    const centerAnim = document.getElementById('centerPlayAnim');
    const speedMenu = document.getElementById('speedMenu');
    const qualityMenu = document.getElementById('qualityMenu');
    const searchInput = document.getElementById('search');
    const channelContainer = document.getElementById('channelList');

    let hls = null;
    let currentChannel = null;
    let currentSpeed = 1;
    let hideControlsTimer = null;
    let activeMenu = null;

    let savedVolume = localStorage.getItem('streamxVol') ? parseFloat(localStorage.getItem('streamxVol')) : 1;
    video.volume = savedVolume;
    volumeSlider.value = savedVolume;
    updateMuteIcon();

    function updateMuteIcon() {
        if (video.muted || video.volume === 0) muteIcon.className = 'fas fa-volume-mute';
        else if (video.volume < 0.5) muteIcon.className = 'fas fa-volume-down';
        else muteIcon.className = 'fas fa-volume-up';
    }

    function setVolume(v) {
        let vol = Math.min(1, Math.max(0, v));
        video.volume = vol;
        video.muted = vol === 0;
        volumeSlider.value = vol;
        localStorage.setItem('streamxVol', vol);
        updateMuteIcon();
    }

    volumeSlider.addEventListener('input', (e) => setVolume(parseFloat(e.target.value)));
    muteBtn.addEventListener('click', () => { if (video.muted) setVolume(savedVolume || 0.5); else setVolume(0); });

    function showLoading(show) { loadingSpinner.style.display = show ? 'flex' : 'none'; }
    function showError(msg, show = true) { if(show) errorToast.style.display = 'flex'; else errorToast.style.display = 'none'; errorToast.innerText = msg || 'Stream error. Tap retry'; }
    function hideError() { errorToast.style.display = 'none'; }

    function showControls() {
        overlay.classList.add('active');
        if (hideControlsTimer) clearTimeout(hideControlsTimer);
        hideControlsTimer = setTimeout(() => { if (!activeMenu) overlay.classList.remove('active'); }, 3500);
    }

    function animateCenterPlay(iconType) {
        centerAnim.querySelector('i').className = `fas fa-${iconType}`;
        centerAnim.style.opacity = '1';
        centerAnim.style.transform = 'translate(-50%, -50%) scale(1)';
        setTimeout(() => { centerAnim.style.opacity = '0'; centerAnim.style.transform = 'translate(-50%, -50%) scale(0.7)'; }, 400);
    }

    function togglePlay() { if (video.paused) video.play().catch(e=>console.warn); else video.pause(); }
    function updatePlayPauseIcon() { playIcon.className = video.paused ? 'fas fa-play' : 'fas fa-pause'; }

    video.addEventListener('play', () => { updatePlayPauseIcon(); animateCenterPlay('play'); showLoading(false); hideError(); });
    video.addEventListener('pause', () => { updatePlayPauseIcon(); animateCenterPlay('pause'); });
    video.addEventListener('waiting', () => showLoading(true));
    video.addEventListener('playing', () => showLoading(false));
    video.addEventListener('error', () => { showLoading(false); showError('Stream failed', true); });
    playPauseBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); showControls(); });

    video.addEventListener('timeupdate', () => { if (video.duration && isFinite(video.duration)) progressBar.value = (video.currentTime / video.duration) * 100; });
    progressBar.addEventListener('input', () => { if (video.duration) video.currentTime = (progressBar.value / 100) * video.duration; });
    fullscreenBtn.addEventListener('click', () => { const container = document.getElementById('video-container'); if (!document.fullscreenElement) container.requestFullscreen().catch(e=>{}); else document.exitFullscreen(); });

    function buildSpeedMenu() {
        speedMenu.innerHTML = '<div class="menu-option" style="font-weight:bold; border-bottom:1px solid #3a4455;">Playback Speed</div>';
        [0.5,0.75,1,1.25,1.5,1.75,2].forEach(sp => {
            const div = document.createElement('div');
            div.className = `menu-option ${currentSpeed === sp ? 'selected' : ''}`;
            div.innerHTML = `${sp}x ${currentSpeed === sp ? '✓' : ''}`;
            div.onclick = (e) => { e.stopPropagation(); video.playbackRate = sp; currentSpeed = sp; buildSpeedMenu(); hideAllMenus(); };
            speedMenu.appendChild(div);
        });
    }

    function updateQualityMenu() {
        if (!hls || !hls.levels || hls.levels.length === 0) { qualityMenu.innerHTML = '<div class="menu-option">Auto (no levels)</div>'; return; }
        qualityMenu.innerHTML = '<div class="menu-option" style="font-weight:bold;">Quality</div>';
        const autoActive = hls.autoLevelEnabled;
        const autoItem = document.createElement('div');
        autoItem.className = `menu-option ${autoActive ? 'selected' : ''}`;
        autoItem.innerHTML = `Auto ${autoActive ? '✓' : ''}`;
        autoItem.onclick = () => { hls.currentLevel = -1; updateQualityMenu(); hideAllMenus(); };
        qualityMenu.appendChild(autoItem);
        hls.levels.forEach((level, idx) => {
            const res = level.height ? `${level.height}p` : 'SD';
            const isCurrent = (!autoActive && hls.currentLevel === idx);
            const opt = document.createElement('div');
            opt.className = `menu-option ${isCurrent ? 'selected' : ''}`;
            opt.innerHTML = `${res} ${isCurrent ? '✓' : ''}`;
            opt.onclick = () => { hls.currentLevel = idx; updateQualityMenu(); hideAllMenus(); };
            qualityMenu.appendChild(opt);
        });
    }

    function hideAllMenus() { speedMenu.classList.remove('show'); qualityMenu.classList.remove('show'); activeMenu = null; showControls(); }
    function toggleMenu(menu) { if (activeMenu === menu && menu.classList.contains('show')) hideAllMenus(); else { hideAllMenus(); menu.classList.add('show'); activeMenu = menu; if (menu === qualityMenu && hls) updateQualityMenu(); } showControls(); }
    speedBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(speedMenu); });
    qualityBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(qualityMenu); });
    document.addEventListener('click', (e) => { if (!e.target.closest('.floating-menu') && !e.target.closest('#speedBtn') && !e.target.closest('#qualityBtn')) hideAllMenus(); });

    function destroyHls() { if (hls) { hls.destroy(); hls = null; } }

    function loadChannel(channel) {
        destroyHls();
        currentChannel = channel;
        hideError();
        showLoading(true);
        video.pause();
        video.removeAttribute('src');
        const streamUrl = channel.url;
        if (Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: false });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { showLoading(false); video.play().catch(e=>console.log('autoplay blocked', e)); if (hls.levels) updateQualityMenu(); });
            hls.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) { if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad(); else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError(); else { showLoading(false); showError('Fatal stream error', true); destroyHls(); } } });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = streamUrl; video.play().catch(e=>showError('Playback failed')); video.addEventListener('loadedmetadata', () => showLoading(false)); }
        else { showLoading(false); showError('HLS not supported', true); }
        video.playbackRate = currentSpeed;
    }

    errorToast.addEventListener('click', () => { if (currentChannel) loadChannel(currentChannel); hideError(); });

    const videoContainer = document.getElementById('video-container');
    let lastTap = 0;
    videoContainer.addEventListener('touchend', (e) => { if (e.target.closest('.btn') || e.target.closest('.floating-menu')) return; const now = Date.now(); if (now - lastTap < 300) { e.preventDefault(); togglePlay(); showControls(); } else showControls(); lastTap = now; });
    videoContainer.addEventListener('click', (e) => { if (e.target.closest('.btn') || e.target.closest('.floating-menu')) return; const now = Date.now(); if (now - lastTap < 300 && lastTap !== 0) togglePlay(); else showControls(); lastTap = now; });

    // ========== KEYBOARD SHORTCUTS (FIXED) ==========
    document.addEventListener('keydown', (e) => {
        // Don't trigger if typing in search input
        if (document.activeElement === searchInput) return;
        
        const key = e.key;
        const code = e.code;
        
        // Play/Pause: Space or K
        if (key === ' ' || key === 'Space' || code === 'Space' || key === 'k' || key === 'K') {
            e.preventDefault();
            togglePlay();
            showControls();
        }
        // Volume Up
        else if (key === 'ArrowUp' || code === 'ArrowUp') {
            e.preventDefault();
            setVolume(Math.min(video.volume + 0.1, 1));
            showControls();
        }
        // Volume Down
        else if (key === 'ArrowDown' || code === 'ArrowDown') {
            e.preventDefault();
            setVolume(Math.max(video.volume - 0.1, 0));
            showControls();
        }
        // Seek Forward +10s
        else if (key === 'ArrowRight' || code === 'ArrowRight') {
            e.preventDefault();
            video.currentTime = Math.min(video.currentTime + 10, video.duration || Infinity);
            showControls();
        }
        // Seek Backward -10s
        else if (key === 'ArrowLeft' || code === 'ArrowLeft') {
            e.preventDefault();
            video.currentTime = Math.max(video.currentTime - 10, 0);
            showControls();
        }
        // Mute: M key
        else if (key === 'm' || key === 'M') {
            e.preventDefault();
            if (video.muted) setVolume(savedVolume || 0.5);
            else { savedVolume = video.volume; setVolume(0); }
            showControls();
        }
        // Fullscreen: F key
        else if (key === 'f' || key === 'F') {
            e.preventDefault();
            const container = document.getElementById('video-container');
            if (!document.fullscreenElement) container.requestFullscreen().catch(e=>{});
            else document.exitFullscreen();
        }
    });

    function renderChannels(filterText = '') {
        const filtered = CHANNELS_DATA.filter(ch => ch.name.toLowerCase().includes(filterText.toLowerCase()) || ch.group.toLowerCase().includes(filterText.toLowerCase()));
        const groups = new Map();
        filtered.forEach(ch => { if (!groups.has(ch.group)) groups.set(ch.group, []); groups.get(ch.group).push(ch); });
        channelContainer.innerHTML = '';
        for (let [groupName, channelsArr] of groups.entries()) {
            const catDiv = document.createElement('div'); catDiv.className = 'channel-category';
            catDiv.innerHTML = `<div class="category-title">${groupName}</div>`;
            channelsArr.forEach(ch => {
                const item = document.createElement('div'); item.className = `channel-item ${currentChannel?.name === ch.name ? 'active' : ''}`;
                item.innerHTML = `<span class="channel-name">${ch.name}</span><span class="playing-badge"><i class="fas fa-play"></i></span>`;
                item.onclick = () => { loadChannel(ch); document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active')); item.classList.add('active'); };
                catDiv.appendChild(item);
            });
            channelContainer.appendChild(catDiv);
        }
    }

    searchInput.addEventListener('input', (e) => renderChannels(e.target.value));
    buildSpeedMenu();
    renderChannels();
    if (CHANNELS_DATA.length) loadChannel(CHANNELS_DATA[0]);
    setVolume(savedVolume);
    updatePlayPauseIcon();
    video.addEventListener('touchstart', (e) => { if(e.touches.length > 1) e.preventDefault(); }, { passive: false });
</script>
</body>
</html>
